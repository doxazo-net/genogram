# Gate definition read by the cc-orchestrator gate-runner (prep-pr / handle-review /
# review-stack). Mirrors this repo's CI (.github/workflows/ci.yml, Node 24), enumerated
# because the repo has no single umbrella target. Prereq: `npm ci` (or npm install) since
# node_modules is gitignored.
[[prep_pr.steps]]
name = "lint"
run = "npm run lint"

[[prep_pr.steps]]
name = "check-native-deps"
run = "npm run check:native"

[[prep_pr.steps]]
name = "typecheck"
run = "npx tsc -b --noEmit"

[[prep_pr.steps]]
name = "build"
run = "npm run build"
